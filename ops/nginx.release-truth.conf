server {
    listen 80;
    listen [::]:80;
    server_name release-truth.167.86.91.77.nip.io;

    client_max_body_size 1m;
    proxy_connect_timeout 10s;
    proxy_read_timeout 65s;
    proxy_send_timeout 65s;

    location ~ ^/api/(auth/|exports/verify|github/|releases/[^/]+/(exports|github/import)) {
        limit_req zone=release_truth_mutations burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3187;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
    }

    location / {
        proxy_pass http://127.0.0.1:3187;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
    }
}
