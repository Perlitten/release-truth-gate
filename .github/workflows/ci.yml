name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: release_truth
          POSTGRES_PASSWORD: release_truth_ci
          POSTGRES_DB: release_truth_test
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U release_truth -d release_truth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CI: "true"
      DATABASE_URL_TEST: postgresql://release_truth:release_truth_ci@127.0.0.1:54329/release_truth_test
      DATABASE_URL: postgresql://release_truth:release_truth_ci@127.0.0.1:54329/release_truth_test
      DATABASE_URL_DIRECT: postgresql://release_truth:release_truth_ci@127.0.0.1:54329/release_truth_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test
      - run: npm run test:db
      - run: npm run audit:prod
      - run: npm run build
      - run: npm run test:e2e
